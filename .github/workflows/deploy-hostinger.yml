name: Deploy a Hostinger (FTP)

# Cada push a main construye el sitio y lo publica en
# calvarysantiago.cl (dominio principal → public_html/)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # Build estático SIN basePath → el sitio vive en la raíz del dominio.
      - name: Build
        run: npm run build

      - name: Deploy por FTP a Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # La cuenta FTP dedicada ya aterriza dentro de public_html,
          # por eso el destino es la raíz de esa conexión ("./").
          server-dir: ./
